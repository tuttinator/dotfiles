# remap prefix to `
set -g prefix `
unbind C-b
bind ` send-prefix

# reload config with visual confirmation
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# true colour support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-ghostty:Tc,alacritty:Tc"

# vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# mouse, history, focus
set -g mouse on
set -g history-limit 50000
set -g focus-events on

# status bar (maglev theme handles most of this, kept for fallback)
set -g status-interval 1
set -g status-right-length 60
set -g renumber-windows on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Automatically set window title
set-window-option -g automatic-rename on

# horizontal and vertical splits
unbind |
bind | split-window -h -c "#{pane_current_path}"
bind t split-window -v -c "#{pane_current_path}"

# resize bindings (repeatable without re-pressing prefix)
unbind Right
bind -r Right resize-pane -R 8
unbind Left
bind -r Left resize-pane -L 8
unbind Up
bind -r Up resize-pane -U 4
unbind Down
bind -r Down resize-pane -D 4

set-option -g status-position top
set-option -g repeat-time 0

# Plugins (modern TPM syntax)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'caiogondim/maglev'

# continuum: auto-restore on tmux start
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# Prefers Homebrew-managed TPM (macOS); falls back to the XDG-cloned copy (Linux/Pi)
if-shell "test -f /opt/homebrew/opt/tpm/share/tpm/tpm" \
    "run '/opt/homebrew/opt/tpm/share/tpm/tpm'" \
    "run '~/.config/tmux/plugins/tpm/tpm'"
